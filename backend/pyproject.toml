[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["migrations", ".venv", "staticfiles"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]

[tool.black]
line-length = 100
target-version = ["py312"]
exclude = '''
/(
    migrations
  | \.venv
  | venv311
  | staticfiles
)/
'''

[tool.coverage.run]
source = ["apps"]
omit = ["*/migrations/*", "*/tests/*"]

[tool.coverage.report]
show_missing = true
fail_under = 70
